# Frontend container for VPS deployment (behind nginx).
# Run on the server only — not for local development.

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        API_BACKEND_URL: ${API_BACKEND_URL:-https://v2.edquate.com:8443}
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-/api/v2}
    container_name: edquate-standalone-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3202:3200"
    environment:
      PORT: "3200"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3200/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
